<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Your Shipment | Airpak Express</title>
    <meta name="description" content="Track your Airpak Express shipment in real-time. Enter your tracking number to get instant updates on your delivery status." />

    <!-- Favicon -->
    <link rel="shortcut icon" type="image/x-icon" href="apps/airpak/images/icon.png" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@400;600&display=swap" rel="stylesheet" />

    <!-- Font Awesome -->
    <link rel="stylesheet" href="apps/airpak/assets/css/font-awesome.min.css" />

    <!-- Supabase Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8ec 100%);
            min-height: 100vh;
        }

        .tracking-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .tracking-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .tracking-header h1 {
            font-family: 'Poppins', sans-serif;
            font-size: 2.5rem;
            font-weight: 600;
            color: #373F41;
            margin-bottom: 10px;
        }

        .tracking-header p {
            color: #737B7D;
            font-size: 1.1rem;
        }

        .tracking-form {
            background: #fff;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.08);
            margin-bottom: 30px;
        }

        .form-group {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .form-group input {
            flex: 1;
            min-width: 250px;
            padding: 16px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #CD2727;
            box-shadow: 0 0 0 4px rgba(205, 39, 39, 0.1);
        }

        .btn-track {
            background: #CD2727;
            color: #fff;
            border: none;
            padding: 16px 40px;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .btn-track:hover {
            background: #b01f1f;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(205, 39, 39, 0.3);
        }

        .tracking-result {
            background: #fff;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.08);
            display: none;
        }

        .tracking-result.active {
            display: block;
        }

        .shipment-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #f0f0f0;
        }

        .info-item {
            text-align: center;
        }

        .info-item .label {
            font-size: 0.85rem;
            color: #737B7D;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .info-item .value {
            font-size: 1.2rem;
            font-weight: 600;
            color: #373F41;
        }

        .status-badge {
            display: inline-block;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .status-transit {
            background: #e3f2fd;
            color: #1565c0;
        }

        .status-delivered {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .status-pending {
            background: #fff3e0;
            color: #ef6c00;
        }

        .timeline {
            position: relative;
            padding-left: 30px;
        }

        .timeline::before {
            content: '';
            position: absolute;
            left: 10px;
            top: 0;
            bottom: 0;
            width: 2px;
            background: #e0e0e0;
        }

        .timeline-item {
            position: relative;
            padding-bottom: 25px;
        }

        .timeline-item::before {
            content: '';
            position: absolute;
            left: -26px;
            top: 5px;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #e0e0e0;
            border: 3px solid #fff;
        }

        .timeline-item.completed::before {
            background: #4caf50;
        }

        .timeline-item.current::before {
            background: #CD2727;
            box-shadow: 0 0 0 4px rgba(205, 39, 39, 0.2);
        }

        .timeline-date {
            font-size: 0.85rem;
            color: #737B7D;
            margin-bottom: 5px;
        }

        .timeline-title {
            font-weight: 600;
            color: #373F41;
            margin-bottom: 5px;
        }

        .timeline-location {
            font-size: 0.9rem;
            color: #737B7D;
        }

        .error-message {
            text-align: center;
            padding: 40px;
            color: #737B7D;
        }

        .error-message i {
            font-size: 3rem;
            margin-bottom: 15px;
            color: #e0e0e0;
        }

        .loading {
            text-align: center;
            padding: 40px;
        }

        .loading i {
            font-size: 2rem;
            color: #CD2727;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .back-link {
            display: inline-block;
            margin-top: 30px;
            color: #CD2727;
            text-decoration: none;
            font-weight: 500;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        @media (max-width: 768px) {
            .tracking-header h1 {
                font-size: 1.8rem;
            }

            .form-group {
                flex-direction: column;
            }

            .form-group input {
                min-width: 100%;
            }

            .btn-track {
                width: 100%;
            }

            .tracking-form, .tracking-result {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="tracking-container">
        <div class="tracking-header">
            <h1>Track Your Shipment</h1>
            <p>Enter your tracking number to get real-time updates on your delivery</p>
        </div>

        <div class="tracking-form">
            <form id="trackingForm" onsubmit="trackShipment(event)">
                <div class="form-group">
                    <input type="text" id="trackingNumber" placeholder="Enter your tracking number (e.g., AP123456789)" required />
                    <button type="submit" class="btn-track">
                        <i class="fa fa-search"></i> Track
                    </button>
                </div>
            </form>
        </div>

        <div id="loadingState" class="loading" style="display: none;">
            <i class="fa fa-spinner fa-spin"></i>
            <p>Searching for your shipment...</p>
        </div>

        <div id="trackingResult" class="tracking-result">
            <div class="shipment-info">
                <div class="info-item">
                    <div class="label">Tracking Number</div>
                    <div class="value" id="resultTrackingNumber">-</div>
                </div>
                <div class="info-item">
                    <div class="label">Status</div>
                    <div class="value"><span id="resultStatus" class="status-badge status-transit">-</span></div>
                </div>
                <div class="info-item">
                    <div class="label">Origin</div>
                    <div class="value" id="resultOrigin">-</div>
                </div>
                <div class="info-item">
                    <div class="label">Destination</div>
                    <div class="value" id="resultDestination">-</div>
                </div>
            </div>

            <h3 style="margin-bottom: 20px; color: #373F41;">Shipment Timeline</h3>
            <div id="timeline" class="timeline">
                <!-- Timeline will be populated here -->
            </div>
        </div>

        <div id="errorState" class="error-message" style="display: none;">
            <i class="fa fa-search"></i>
            <h3>No results found</h3>
            <p>Please check your tracking number and try again</p>
        </div>

        <a href="index.html" class="back-link">
            <i class="fa fa-arrow-left"></i> Back to Home
        </a>
    </div>

    <script>
        // Supabase configuration
        const SUPABASE_URL = 'https://zygoqqsgzhgpvlpttfbk.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp5b3FxcXNnemhncHZsdHB0ZmJrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDk4MTYzMTAsImV4cCI6MjA2NTM5MjMxMH0.placeholder';

        // Track shipment function - connects to Supabase backend
        async function trackShipment(event) {
            event.preventDefault();

            const trackingNumber = document.getElementById('trackingNumber').value.trim();
            const loadingState = document.getElementById('loadingState');
            const trackingResult = document.getElementById('trackingResult');
            const errorState = document.getElementById('errorState');

            // Hide previous results
            trackingResult.classList.remove('active');
            errorState.style.display = 'none';
            loadingState.style.display = 'block';

            try {
                // Try Supabase first
                const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                const { data, error } = await supabase
                    .from('shipments')
                    .select('*')
                    .eq('tracking_number', trackingNumber)
                    .single();

                if (error) {
                    throw error;
                }

                if (data) {
                    displayTrackingResult(data);
                } else {
                    // Try shipnow API as fallback
                    await tryShipnowAPI(trackingNumber);
                }
            } catch (supabaseError) {
                // Try shipnow API as fallback
                try {
                    await tryShipnowAPI(trackingNumber);
                } catch (apiError) {
                    // If all fails, show demo tracking
                    displayDemoTracking(trackingNumber);
                }
            }

            loadingState.style.display = 'none';
        }

        async function tryShipnowAPI(trackingNumber) {
            const response = await fetch(`https://shipnow.airpak-express.site/api/tracking/${trackingNumber}`, {
                method: 'GET',
                headers: {
                    'Content-Type': 'application/json'
                }
            });

            if (response.ok) {
                const data = await response.json();
                displayTrackingResult(data);
            } else {
                // Show demo tracking if API not available
                displayDemoTracking(trackingNumber);
            }
        }

        function displayTrackingResult(data) {
            const trackingResult = document.getElementById('trackingResult');
            const resultTrackingNumber = document.getElementById('resultTrackingNumber');
            const resultStatus = document.getElementById('resultStatus');
            const resultOrigin = document.getElementById('resultOrigin');
            const resultDestination = document.getElementById('resultDestination');
            const timeline = document.getElementById('timeline');

            resultTrackingNumber.textContent = data.tracking_number || data.trackingNumber || '-';
            resultStatus.textContent = data.status || 'In Transit';
            resultOrigin.textContent = data.origin || 'Warehouse';
            resultDestination.textContent = data.destination || '-';

            // Status badge styling
            if (data.status === 'Delivered') {
                resultStatus.className = 'status-badge status-delivered';
            } else if (data.status === 'Pending') {
                resultStatus.className = 'status-badge status-pending';
            } else {
                resultStatus.className = 'status-badge status-transit';
            }

            // Generate timeline
            let timelineHTML = '';
            const events = data.events || generateDemoEvents();

            events.forEach((event, index) => {
                const isCompleted = index < events.length - 1;
                const isCurrent = index === events.length - 1;

                timelineHTML += `
                    <div class="timeline-item ${isCurrent ? 'current' : ''} ${isCompleted ? 'completed' : ''}">
                        <div class="timeline-date">${event.date} - ${event.time}</div>
                        <div class="timeline-title">${event.title}</div>
                        <div class="timeline-location">${event.location}</div>
                    </div>
                `;
            });

            timeline.innerHTML = timelineHTML;
            trackingResult.classList.add('active');
        }

        function displayDemoTracking(trackingNumber) {
            const trackingResult = document.getElementById('trackingResult');
            const resultTrackingNumber = document.getElementById('resultTrackingNumber');
            const resultStatus = document.getElementById('resultStatus');
            const resultOrigin = document.getElementById('resultOrigin');
            const resultDestination = document.getElementById('resultDestination');
            const timeline = document.getElementById('timeline');

            resultTrackingNumber.textContent = trackingNumber;
            resultStatus.textContent = 'In Transit';
            resultStatus.className = 'status-badge status-transit';
            resultOrigin.textContent = 'Warehouse';
            resultDestination.textContent = 'Destination';

            const events = generateDemoEvents();
            let timelineHTML = '';

            events.forEach((event, index) => {
                const isCompleted = index < events.length - 1;
                const isCurrent = index === events.length - 1;

                timelineHTML += `
                    <div class="timeline-item ${isCurrent ? 'current' : ''} ${isCompleted ? 'completed' : ''}">
                        <div class="timeline-date">${event.date} - ${event.time}</div>
                        <div class="timeline-title">${event.title}</div>
                        <div class="timeline-location">${event.location}</div>
                    </div>
                `;
            });

            timeline.innerHTML = timelineHTML;
            trackingResult.classList.add('active');
        }

        function generateDemoEvents() {
            const now = new Date();
            const events = [];

            const pickupDate = new Date(now);
            pickupDate.setDate(pickupDate.getDate() - 3);
            events.push({
                date: pickupDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }),
                time: '09:30 AM',
                title: 'Shipment Picked Up',
                location: 'Warehouse'
            });

            const transitDate = new Date(now);
            transitDate.setDate(transitDate.getDate() - 2);
            events.push({
                date: transitDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }),
                time: '02:15 PM',
                title: 'In Transit to Destination',
                location: 'Sorting Center'
            });

            const customsDate = new Date(now);
            customsDate.setDate(customsDate.getDate() - 1);
            events.push({
                date: customsDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }),
                time: '11:00 AM',
                title: 'Customs Clearance',
                location: 'Border Crossing'
            });

            events.push({
                date: now.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }),
                time: '08:00 AM',
                title: 'Out for Delivery',
                location: 'Distribution Center'
            });

            return events;
        }

        // Check for tracking number in URL
        const urlParams = new URLSearchParams(window.location.search);
        const urlTrackingNumber = urlParams.get('tracking');
        if (urlTrackingNumber) {
            document.getElementById('trackingNumber').value = urlTrackingNumber;
            trackShipment({ preventDefault: () => {} });
        }
    </script>
</body>
</html>
